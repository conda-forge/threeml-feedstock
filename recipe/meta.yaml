{% set name = "threeml" %}
{% set version = "2.4.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 8020289db4fa4543c8287abc1f11967c2c8cabd6e3eaf4b767233e3b92869693
  patches:
    - versioneer.patch

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - astropy
    - python >={{ python_min }}
    - numpy >=1.16
    - scipy >=1.4
    - emcee >=3
    - astropy-base
    - matplotlib-base <3.9
    - uncertainties
    - pyyaml >=5.1
    - dill
    - iminuit >=2.0
    - astromodels
    - astroquery
    - corner
    - pandas
    - requests
    - speclite >=0.11
    - ipython
    - ipyparallel
    - joblib
    - numexpr
    - dynesty
    - numba
    - numdifftools
    - tqdm >=4.56.0
    - colorama
    - omegaconf
    - ipywidgets
    - rich

test:
  imports:
    - threeML
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/threeml/threeML
  summary: The Multi-Mission Maximum Likelihood framework
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
